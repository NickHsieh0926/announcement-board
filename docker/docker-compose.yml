  services:

    mysql:
      image: mysql:8
      container_name: board-mysql
      environment:
        MYSQL_ROOT_PASSWORD: rootpassword
        MYSQL_DATABASE: board_db
        MYSQL_USER: sa
        MYSQL_PASSWORD: p@ssw0rd
      volumes:
        - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
        - mysql_data:/var/lib/mysql
      ports:
        - "3306:3306"
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sa", "-pp@ssw0rd"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

    app:
      build:
        context: ../back-end/announcement-board
        dockerfile: Dockerfile
      container_name: board-app
      environment:
        DB_URL: jdbc:mysql://mysql:3306/board_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Taipei
        DB_USER: sa
        DB_PASS: p@ssw0rd
      ports:
        - "8080:8080"
      depends_on:
        mysql:
          condition: service_healthy

  volumes:
    mysql_data: